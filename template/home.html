<html>
<body>
<style>
    :root{--card-bg:#ffffff;--accent:#2f80ed;--muted:#6b7280}
    html,body{height:100%}
    body{font-family:Segoe UI, Roboto, system-ui, -apple-system, Arial;display:flex;align-items:center;justify-content:center;margin:0;padding:32px;background:linear-gradient(135deg,#f3f7fb 0%,#e6eef8 100%);color:#172133}
    .login{background:var(--card-bg);width:100%;max-width:820px;border-radius:12px;padding:28px 32px;box-shadow:0 12px 30px rgba(16,24,40,0.08);box-sizing:border-box}
    .login h1{font-size:20px;margin:0 0 14px;text-align:center;color:var(--accent);letter-spacing:0.2px}
    form h1{margin:0 0 18px;font-size:16px;text-align:center;color:#1f2937}
    .mb-3{margin-bottom:14px}
    label.form-label{display:block;font-weight:600;margin-bottom:6px;color:#111827;font-size:14px}
    .form-control{width:100%;padding:10px 12px;border:1px solid #e6eef6;border-radius:8px;background:#fbfdff;font-size:14px;color:#0f1724;box-sizing:border-box;transition:box-shadow .12s ease,border-color .12s ease}
    .form-control:focus{outline:none;border-color:rgba(47,128,237,0.9);box-shadow:0 6px 18px rgba(47,128,237,0.12)}
    select.form-control{-webkit-appearance:none;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 14px) calc(1em + 2px),calc(100% - 10px) calc(1em + 2px);background-size:6px 6px,6px 6px;background-repeat:no-repeat}
    .placeholder{color:#94a3b8}
    input[type=number].form-control{max-width:240px}
    .btn{display:inline-block;padding:10px 16px;background:linear-gradient(90deg,var(--accent),#56ccf2);color:#fff;border-radius:10px;border:none;font-weight:700;cursor:pointer;box-shadow:0 10px 26px rgba(47,128,237,0.18);transition:transform .12s ease,box-shadow .12s ease}
    .btn:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(47,128,237,0.18)}
    h2{text-align:center;margin-top:18px;color:#0b3d91;font-weight:700}
    @media (max-width:520px){body{padding:18px}.login{padding:18px;border-radius:10px}.form-control{font-size:15px}}
</style>
        <div class="login">
       <!---<h1>Student Exam Performance Indicator</h1>-->
   
       <form action="{{ url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Student Exam Performance Prediction</legend>
        </h1>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" placeholder="Enter you Gender" required>
                <option class="placeholder" selected disabled value="">Select your Gender</option>
                <option value="male">
                    Male
                </option>
                <option value="female">
                    Female
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" placeholder="Enter you ethnicity" required>
                <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                <option value="group A">
                    Group A
                </option>
                <option value="group B">
                    Group B
                </option>
                <option value="group C">
                    Group C
                </option>
                <option value="group D">
                    Group D
                </option>
                <option value="group E">
                    Group E
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education"
                placeholder="Enter you Parent Education" required>
                <option class="placeholder" selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">
                    associate's degree
                </option>
                <option value="bachelor's degree">
                    bachelor's degree
                </option>
                <option value="high school">
                    high school
                </option>
                <option value="master's degree">
                    master's degree
                </option>
                <option value="some college">
                    some college
                </option>
                <option value="some high school">
                    some high school
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" placeholder="Enter you Lunch" required>
                <option class="placeholder" selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">
                    free/reduced
                </option>
                <option value="standard">
                    standard
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter you Course"
                required>
                <option class="placeholder" selected disabled value="">Select Test_course</option>
                <option value="none">
                    None
                </option>
                <option value="completed">
                    Completed
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Writing Score out of 100</label>
            <input class="form-control" type="number" name="reading_score"
                placeholder="Enter your Reading score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <label class="form-label">Reading Score out of 100</label>
            <input class="form-control" type="number" name="writing_score"
                placeholder="Enter your Reading Score" min='0' max='100' />
        </div>
        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict your Maths Score" required />
        </div>
    </form>
    <h2>
       THE  prediction is {{results}}
    </h2>
   <body>
</html>
